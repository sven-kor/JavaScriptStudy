<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>

  <!-- DOM취득-->
  //클래스에 tag 두 개 붙이는 방법(" ")공백 / 케밥케이스로 썼음
  <h1 id="title" class="title head-tag">안녕하세요</h1>
  <h3 id="sub-title" class="title head-tag">Hello</h3>
  <script>
    const title = document.getElementById("title");
    console.log(title);
    const subTitle = document.getElementById("sub-title");
    console.log(subTitle);
    const titleList = document.getElementsByClassName("title");
    console.log(titleList);
    //HTMLCollection은 forEach안되므로 향상 for문
    for(const element of titleList) {
      console.log(element);
    }

    //id 선택자 : # 다음에 id
    //class 선택자: . 다음에 class
    const headTags = document.querySelectorAll('.head-tag');
    console.log(headTags);
    //NodeList는 forEach되니까.
    headTags.forEach(tag => console.log(tag));
  </script>

  <!-- DOM Attribute-->
  <div>
  <input type="text" id="id" class="inp" value="홍길동" readonly>
</div>
<script>
  const id = document.getElementById('id');
  
  //Attribute 취득
  console.log('type:', id.getAttribute('type'));  // "text"
  console.log('name:', id.getAttribute('name'));  // null (name 속성이 없음)
  console.log('id:', id.getAttribute('id'));  // "id"
  console.log('class:', id.getAttribute('class'));  // "inp"
  console.log('readonly:', id.getAttribute('readonly'));  // "" (readonly 속성의 값이 없음) -> 이거는 원래 값이 없고 그냥 readonly만 있어도 적용되니까 없음.

  //Attribute 변경
  id.setAttribute("value", "김형준"); //기존value수정
  id.setAttribute("name", "김메롱"); //추가 가능->없었는데 JS코드로 넣을 수 있음 Elements보면 추가되어있음.
  if(id.hasAttribute("readonly")) {
    console.log('읽기 전용 속성')
  }

  //Attribute삭제
  id.removeAttribute('readonly')
</script>

<!--DOM Property-->
<div>
  <input type="text" id="name" class="inp" value="홍길동" readonly>
</div>
<script>
  const name = document.getElementById('name');
  
  console.log(name.type);  // "text"
  console.log(name.id);  // "id"
  console.log(name.className);  // "inp"
  console.log(name.value);  // "홍길동"
  console.log(name.readOnly);  // true
</script>

</body>
</html>
