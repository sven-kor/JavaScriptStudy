<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
    //카트 아이템
    class CartItem {
      //private 필드
      #quantity;
      #price;

      //생성자
      constructor(name, price, quantity = 1) {
        this.name = name;
        // this.#price = price; //private 프로퍼니에 전달 -> 안좋음!(대비 안됨)
        this.price = price; //setter로 전달
        this.quantity = quantity; //setter로 전달
      }

      get quantity() {
        return this.#quantity
      }

      set quantity(value) {
        if(!Number.isInteger(value) || value < 0) {
          console.error('수량은 최소 1개 이상의 정수여야합니다')
          return;
        }
        this.#quantity = value;
      }

      get price() {
        return this.#price
      }

      set price(value){
        if(value < 0) {
          console.error('가격은 0원 이상 입력해야합니다')
          return;
        }
        this.#price = value;
      }

      getTotalPrice() {
        return this.#price * this.#quantity; //가격 * 수량
      }

      getSummary() {
        return `${this.name} | 단가: ${this.#price} | 수량 ${this.#quantity} | 총가격: ${this.getTotalPrice()}`;
      }

      //수량 추가
      addQuantity(amount){
        if(amount <=0){
          console.error('추가 수량은 0이상이어야 합니다. ')
          return;
        }
        this.quantity += amount; //Setter호출함
      }

    }
        
    // const item = new CartItem('tv', 500000);
    // console.log(item);
    // item.addQuantity(1);
    // console.log(item);
    // item.price = -1000;
    // item.quantity = -1
    // item.addQuantity(0);


    class DiscountCartItem extends CartItem {
      
      #discountRate;
      //생성자
      constructor(name,price,quantity=1,discountRate=0){
        super(name,price,quantity)
        this.discountRate = discountRate
      }
      //Getter,Setter
      get discountRate() {
        return this.#discountRate;
      }
      set discountRate(value){
        if(value<0 || value>100){
          console.error('할인율이 0보다 작거나 100보다 클 수 없습니다.')
          return;
        }
        this.#discountRate = value;
      }
      // get price() {
      //   return super.price;
      // }
      // set price(value){
      //   super.price(value);
      // }
      // get quantity() {
      //   return super.quantity;
      // }
      // set quantity(value) {
      //   super.quantity(value);
      // }

      //메서드 오버라이드
      getTotalPrice() {
        return super.price * super.quantity * (1-this.#discountRate/100) //가격 * 수량
      }
      getSummary() {
        return `${this.name} | 단가: ${super.price} | 수량 ${super.quantity} | 총가격: ${this.getTotalPrice()} | 할인율: ${this.#discountRate/100}`;
      }
      addQuantity(amount){
        if(amount <=0){
          console.error('추가 수량은 0이상이어야 합니다. ')
          return;
        }
        this.quantity += amount; //Setter호출함
      }
    }
    const item = new DiscountCartItem('냉장고',1000000,10,10);
    console.log(item.getSummary());
    

  </script>

  
</body>
</html>
