<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>

  //객체 리터럴 표기법(중괄호 {})
  {
    const person = {
      name: "김형준",
      age: 36, //마지막인데 ,(후행 쉼표) 허용
    }
  }
  //속성 (프로퍼티: Property)
  {
    const car = {
      model: 'Genesis', //key: value => Property
      price: 5000,
      'car-maker': 'Hyundai',
      year: 2026,
      owner: {
        name: '김형준'
      }
    }

    //Property Value 가져오기
    //1. Dot(.) : 일반적인 상황
    console.log(car.model);
    console.log(car.price);
    
    //2. Bracket([]) : 특수한 상황(key에 공백 or 하이픈 포함, key가 변수에 저장된 경우)
    console.log(car['model']);
    console.log(car['price']);
    console.log(car['car-maker']);
    const key = 'year';
    console.log(car[key]);
    
    //3. Optional Chaining(?.)
    //평가 대상이 없으면? 원래는 오류 -> undefined를 반환하는 방법
    console.log(car.owner.name);
    console.log(car?.member?.name);

    //Property 다루기
    //없는 Key에 값을 할당하면: 새로 생성
    //있는 Key에 값을 할당하면: 기존 값 수정
    const book = {}
    book.title = '별주부전' // title Property 생성
    book.title = '홍길동전' // title Property 수정
    console.log(book.title);

    //Property Shorthand(단축 표현법)
    //Key, value 이름이 같은 경우 한 번만 작성!
    {
      const zipCode = '1234';
      const street = '강남대로';
      const address = {
        zipCode, //zipCode: zipCode,
        street, //street: street,
      }
      console.log(address);
    }

    //객체 구조 분해 할당(Object Destructuring Assignment)
    {
      const qna = {
        q: '한국의 수도는?',
        a: '서울',
      }
      //원래는
      //const question = qna.q;
      //const answer = qna.a;

      //구조 분해 할당
      const {q, a} = qna;
      console.log(q,a)
      //이름 변경 가능
      const {q: question, a: answer} = qna;
      console.log(question,answer);

      //간단한 연습(객체를 함수에 전달할 때) : 이거 신기하네. 
      function fnPrintUser({id, pw}) {
        console.log(id, pw);
      }
      const user = {
        id: 'admin',
        pw: '1234',
      }
      fnPrintUser(user)
      //나머지 속성(Rest Property)
      //말 줄임표(...) 사용 : 할당 연산자(=) 기준으로 왼쪽에 배치, 값을 전달받는 쪽
      const computer = {
        cpu: 'm4',
        ram: '8g',
        ssd: '128g',
      }
      //구조 분해 할당 시 나머지 속성 사용
      const {cpu, ...rest} = computer;
      console.log(cpu);
      console.log(rest);//{ram: '8g', ssd: '128g'}
    }

    //전개 구문(Spread Syntax)
    //말 줄임표(...) 사용 : 할당 연산자(=) 기준으로 오른쪽에 배치, 값을 전달하는 쪽
    {
      const phone = {
        model: 'galaxy flip',
        size: '5inch',
      }
      const smartPhone = {
        ...phone, //phone 객체의 property를 펼쳐라
        size: '6inch',
      }
      console.log(smartPhone);
    }
    
    //this 
    //어떤 함수를 호출하는 주체
    {
      //일반 함수의 this 바인딩
      function print() {
        console.log('print 호출:', this)
      }
      print(); //호출주체: 전역 객체(window)

      //메서드(객체가 가진 함수)의 this 바인딩
      const car = {
        model: 'Ray',
        drive: function () {
          console.log('drive:', this);
          console.log(this.model + '타고 드라이브!');
        }
      }
      car.drive(); //호출하는건 car 객체
    }

    //객체 생성자 함수 : 동일 프로퍼티를 가진 여러 객체가 필요할 때 유용함
    {
      //생성자 함수는 PascalCase권장(다른 함수와 구별하게)
      function Office(location) {
        //this 바인딩: 생성자 함수로 생성하는 객체에 연결됨
        this.location = location;
      }
      //객체 생성: new 연산자로 생성
      const office1 = new Office('101호');
      const office2 = new Office('201호');
      console.log(office1);
      console.log(office2 instanceof Office);
    }
    //프로토 타입
    //모든 객체가 가지는 부모 타입의 객체를 의미함(Object)
    //프로토타입에는 공유 데이터를 넣고 사용함
    {
      const member = {
        name: 'Kim',
        age: 30,

      }
      console.log(member);
      console.log(member.toString()); //프로토타입 객체가 지원

    }

    //프로토 타입이 필요한 경우
    function Coffee(store){
      this.store = store;
    //   this.info = function() { // 이 구성은 객체마다 동일한 메서드를 가지므로, 메모리 낭비!!
    //     console.log(`${this.store}에서 파는 커피`);
    //   }
    }

    //Coffee생성자 함수의 메서드를 프로토 타입에 등록(공유 영역에 등록)
    Coffee.prototype.info = function() {
      console.log(`${this.store}에서 파는 커피`);
    }


    const coffee1 = new Coffee('mega');
    const coffee2 = new Coffee('compose');
    coffee1.info();
    coffee2.info();
    console.log(coffee1);


  }
  </script>
</body>
</html>
