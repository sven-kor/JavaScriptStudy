<!DOCTYPE html>
<html lang="en">

<body>
  <!-- XMLHttpRequest 객체-->
   <form id="agify-form">
    <label for="name">이름</label>
    <input type="text" id="name">
    <button type="submit">제출</button>
   </form>
   <div id="agify-result">여기에 결과가 노출됩니다.</div>
   <script>
    const agifyForm = document.getElementById('agify-form');
    agifyForm.addEventListener('submit', e => {
      e.preventDefault(); //폼 제출은 동기 처리 방식이므로, 비동기 요청 시 항상 취소해야합니다.
      //이제 부터 비동기 요청
      const xhr = new XMLHttpRequest();
      xhr.open('get', `https://api.agify.io/?name=${document.getElementById('name').value}`);
      xhr.addEventListener('readystatechange', () => {
        if(xhr.readyState ===4){
          if(xhr.status === 200){
            const result = xhr.responseText;//응답 결과가 JSON인 경우 "JSON문자열"로 받아옵니다. 
            const obj = JSON.parse(result);//JSON문자열 -> JS객체로 반환
            document.getElementById('agify-result').textContent = `count=${obj.count}, name=${obj.name}, age=${obj.age}`;

          }
        }
      })
      xhr.send();
    })
   </script>
